<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f2fe" />
            <stop offset="100%" stop-color="#d946ef" />
        </linearGradient>
        <linearGradient id="text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#00f2fe" />
        </linearGradient>
        
        <!-- Neon Glow Filters -->
        <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background Card -->
    <rect width="512" height="512" rx="128" fill="#06070a" stroke="url(#glow-grad)" stroke-width="16" />
    
    <!-- Cyber Terminal Scanlines mockup in background -->
    <path d="M 0,100 L 512,100 M 0,200 L 512,200 M 0,300 L 512,300 M 0,400 L 512,400" stroke="rgba(0, 242, 254, 0.05)" stroke-width="4" />
    
    <!-- Neon letter 'A' -->
    <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" font-family="'Fira Code', monospace, Courier" font-weight="900" font-size="280" fill="url(#text-grad)" filter="url(#neon-glow)" letter-spacing="-10">A</text>
    
    <!-- Subtitle console brackets -->
    <path d="M 120,380 L 80,380 L 80,440 L 120,440" fill="none" stroke="#d946ef" stroke-width="12" stroke-linecap="round" filter="url(#neon-glow)" />
    <path d="M 392,380 L 432,380 L 432,440 L 392,440" fill="none" stroke="#d946ef" stroke-width="12" stroke-linecap="round" filter="url(#neon-glow)" />
    
    <text x="50%" y="81%" dominant-baseline="middle" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="40" fill="#d946ef" letter-spacing="4">ASCII</text>
</svg>
